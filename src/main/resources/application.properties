# Importa il file locale (se esiste) che contiene le vere API Key
spring.config.import=optional:classpath:application-secret.properties

# Copia questo file in WebContent/WEB-INF/config.properties
# e sostituisci i valori con le tue API key

# API key OpenWeatherMap — gratuita su https://openweathermap.org/api
openweathermap.api.key=IL_TUO_OPENWEATHER_API_KEY

# API key Pexels — gratuita su https://www.pexels.com/api/
pexels.api.key=IL_TUO_PEXELS_API_KEY